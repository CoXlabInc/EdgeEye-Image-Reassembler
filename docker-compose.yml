services:
  redis:
    image: redis:alpine
    restart: always
    logging:
      driver: "local"

  mjpeg_streamer:
    container_name: mjpeg_streamer
    image: edgeeye_mjpeg_streamer
    build:
      context: .
      dockerfile: Dockerfile-streamer
    restart: always
    logging:
      driver: "local"
    ports:
      - 8083:8080
    environment:
      - TZ=${TZ:-UTC}
      - LANG=${LANG:-en_US.UTF-8}
      - UPLOAD_URL=${UPLOAD_URL:-}
      - UPLOAD_HEADERS=${UPLOAD_HEADERS:-}
      - SAVE_DIR=${SAVE_DIR:+/data/${SAVE_DIR}}
    volumes:
      - ./${SAVE_DIR:-saved_images}:/data/${SAVE_DIR:-saved_images}
    command: npm start -- -r ${REDIS_URL:-redis://redis} -u ${UPLOAD_URL:-} -M ${DET_UPLOAD_MODE:-2} -O ${UPLOAD_OVERLAY:-timestamp,bbox} ${SAVE_DIR:+-s /data/${SAVE_DIR}}

  edgeeye_reassembler:
    container_name: edgeeye_reassembler
    image: edgeeye_reassembler
    build:
      context: .
      dockerfile: Dockerfile-reassembler
    restart: always
    logging:
      driver: "local"
    environment:
      - TZ=${TZ:-UTC}
      - LANG=${LANG:-en_US.UTF-8}
    command:
      - python3
      - -u
      - EdgeEye.py
      - --mqtt_url
      - ${MQTT_URL:-tcp://mosquitto:1883}
      - --redis_url
      - ${REDIS_URL:-redis://redis}
      - --device_profile_id
      - ${DEVICE_PROFILE_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
