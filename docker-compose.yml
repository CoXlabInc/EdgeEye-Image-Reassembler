services:
  iotown_mjpeg_streamer:
    image: iotown_image_streamer
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "local"
    networks:
      - iotown_default
    ports:
      - 8080:8080
    command: npm start -- -r ${REDIS_URL:-redis://redis}

  mediamtx:
    image: iotown_image_streamer
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "local"
    networks:
      - iotown_default
    volumes:
      - ./config/mediamtx.yml:/root/mediamtx.yml
    ports:
      - 8554:8554
      - 9997:9997

  edgeeye_pp:
    container_name: edgeeye_pp
    build:
      context: .
      dockerfile: Dockerfile-pp
    restart: always
    logging:
      driver: "local"
    networks:
      - iotown_default
    command:
      - python3
      - -u
      - pp.py
      - --url
      - https://$IOTOWN_MESSAGE_PARSER_USER:$IOTOWN_MESSAGE_PARSER_TOKEN@iotown
      - --mqtt_url
      - tcp://mosquitto:8883
      - --redis_url
      - ${REDIS_URL:-redis://redis}
      - --chirpstack_url
      - ${CHIRPSTACK_URL:-}
      - --chirpstack_jwt_secret
      - ${CHIRPSTACK_JWT_SECRET:-}
      - --dry
      - $IOTOWN_MESSAGE_PARSER_DRY_RUN

networks:
  iotown_default:
    external: true
